name: Run servo motor constraints instant MPC

on:
  workflow_dispatch:

jobs:
  run_servo_motor_constraints_instant_MPC:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        define:
        - ''

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Install dependencies
      run: 'sudo apt update

        sudo apt install -y build-essential

        sudo apt install -y cmake

        sudo apt install -y pybind11-dev

        sudo apt install -y python3.12

        sudo apt install -y python3.12-dev

        sudo apt install -y python3.12-venv

        '
    - name: Set up Python environment
      run: 'python3 -m venv /opt/venv_py_MCAP

        /opt/venv_py_MCAP/bin/pip install --upgrade pip

        /opt/venv_py_MCAP/bin/pip install --upgrade setuptools

        /opt/venv_py_MCAP/bin/pip install numpy control pandas jupyter openpyxl sympy
        astor pybind11 networkx plotly dash flask

        '
    - name: Configure swap space
      run: 'sudo swapoff -a

        sudo rm -f /swapfile

        sudo dd if=/dev/zero of=/swapfile bs=1M count=8192

        sudo chmod 600 /swapfile

        sudo mkswap /swapfile

        sudo swapon /swapfile

        free -h

        '
    - name: Run Python script
      run: '/opt/venv_py_MCAP/bin/python3 ./sample/lti/servo_motor_constraints_instant_MPC.py

        '
    - name: Build C++ application
      timeout-minutes: 20
      run: 'g++ -O0 -std=c++11 -ftemplate-depth=10000 -I . -I ./mpc_utility -I ./python_mpc
        -I ./external_libraries/python_optimization_to_cpp/optimization_utility -I
        ./external_libraries/python_optimization_to_cpp/python_optimization -I ./external_libraries/python_control_to_cpp/python_control
        -I ./external_libraries/python_numpy_to_cpp/python_numpy -I ./external_libraries/python_numpy_to_cpp/base_matrix
        -I ./external_libraries/python_math_to_cpp/base_math -I ./external_libraries/python_math_to_cpp/python_math
        -I ./external_libraries/base_utility_cpp/base_utility ./sample/lti/servo_motor_constraints_instant_MPC.cpp
        -o ./servo_motor_constraints_instant_MPC

        '
    - name: Run C++ application
      timeout-minutes: 5
      run: './servo_motor_constraints_instant_MPC

        '
